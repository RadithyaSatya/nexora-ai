services:
  nexora-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora-ai-dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8001}:${APP_PORT:-8001}"
    environment:
      NEXORA_HOST: 0.0.0.0
      NEXORA_PORT: ${APP_PORT:-8001}
      NEXORA_HISTORY_WINDOW_DAYS: ${HISTORY_WINDOW_DAYS:-7}
      NEXORA_MIN_HISTORY_SAMPLES: ${MIN_HISTORY_SAMPLES:-24}
      NEXORA_MAX_RECOMMENDATIONS: ${MAX_RECOMMENDATIONS:-3}
      NEXORA_HIGH_TRIGGER_MULTIPLIER: ${HIGH_TRIGGER_MULTIPLIER:-1.22}
      NEXORA_CRITICAL_TRIGGER_MULTIPLIER: ${CRITICAL_TRIGGER_MULTIPLIER:-1.45}
      NEXORA_BASELINE_SHORT_WINDOW: ${BASELINE_SHORT_WINDOW:-6}
      NEXORA_BASELINE_LONG_WINDOW: ${BASELINE_LONG_WINDOW:-24}
      NEXORA_BASELINE_SHORT_WEIGHT: ${BASELINE_SHORT_WEIGHT:-0.6}
      NEXORA_BASELINE_LONG_WEIGHT: ${BASELINE_LONG_WEIGHT:-0.4}
